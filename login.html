<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard auth</title>
    <link rel="stylesheet" href="./styles/login.css">
    <script src="./scripts/login.js" defer></script>
</head>
<body>
    <div id="loginContainer" class="loginContainer hidden">
        <h2>Login</h2>
        <input type="text" id="usernameInput" class="inputField" placeholder="Enter username">
        <input type="password" id="passwordInput" class="inputField" placeholder="Enter password">
        <button id="loginButton" onclick="login()">Login</button>
        <p id="errorMessage"></p>
</body>
</html>
